name: ZAP Baseline

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  zap-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Start Juice Shop
        run: |
          npm start > juice-shop.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              echo "Juice Shop is up"
              exit 0
            fi
            sleep 5
          done
          echo "Juice Shop failed to start"
          cat juice-shop.log
          exit 1

      - name: Run ZAP Baseline
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://127.0.0.1:3000'
          fail_action: false
          allow_issue_writing: true
          artifact_name: zap-report

      - name: Upload app log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: juice-shop-log
          path: juice-shop.log
